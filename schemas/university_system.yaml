name: university_system
dialect: sqlite

tables:

  students:
    columns:
      id: { type: int, is_pk: true }
      first_name: varchar
      last_name: varchar
      email: varchar
      enrollment_year: int
      major: varchar
      gpa: real
      is_full_time: boolean
      created_at: datetime

  instructors:
    columns:
      id: { type: int, is_pk: true }
      first_name: varchar
      last_name: varchar
      email: varchar
      department_id: int
      hire_date: datetime
      rank: varchar
      salary: real
      is_active: boolean

  departments:
    columns:
      id: { type: int, is_pk: true }
      name: varchar
      building: varchar
      budget: real
      chair_id: int
      is_active: boolean

  courses:
    columns:
      id: { type: int, is_pk: true }
      course_code: varchar
      title: varchar
      credits: int
      department_id: int
      level: varchar
      is_active: boolean

  sections:
    columns:
      id: { type: int, is_pk: true }
      course_id: int
      instructor_id: int
      semester: varchar
      year: int
      room_number: varchar
      schedule_time: varchar
      capacity: int

  enrollments:
    columns:
      student_id: int
      section_id: int
      enrolled_at: datetime
      grade: varchar
      status: varchar

  assignments:
    columns:
      id: { type: int, is_pk: true }
      section_id: int
      title: varchar
      description: text
      due_date: datetime
      max_score: real

  submissions:
    columns:
      id: { type: int, is_pk: true }
      assignment_id: int
      student_id: int
      submitted_at: datetime
      score: real
      feedback: text

  research_projects:
    columns:
      id: { type: int, is_pk: true }
      title: varchar
      description: text
      start_date: datetime
      end_date: datetime
      funding_amount: real
      department_id: int
      principal_investigator_id: int
      status: varchar

foreign_keys:
  - [instructors, departments, id, chair_id]
  - [departments, instructors, id, department_id]
  - [departments, courses, id, department_id]
  - [courses, sections, id, course_id]
  - [instructors, sections, id, instructor_id]
  - [students, enrollments, id, student_id]
  - [sections, enrollments, id, section_id]
  - [sections, assignments, id, section_id]
  - [assignments, submissions, id, assignment_id]
  - [students, submissions, id, student_id]
  - [departments, research_projects, id, department_id]
  - [instructors, research_projects, id, principal_investigator_id]
