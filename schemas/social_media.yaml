name: social_media
dialect: sqlite
tables:
  users:
    columns:
      id: { type: int, is_pk: true }
      username: varchar
      email: varchar
      signup_date: datetime
      is_verified: boolean
      country_code: varchar
  posts:
    columns:
      id: { type: int, is_pk: true }
      user_id: int
      content: text
      posted_at: datetime
      view_count: int
  comments:
    columns:
      id: { type: int, is_pk: true }
      user_id: int
      post_id: int
      comment_text: text
      created_at: datetime
  likes:
    columns:
      user_id: int
      post_id: int
      liked_at: datetime
  follows:
    columns:
      follower_id: int
      followee_id: int
      followed_at: datetime
foreign_keys:
  - [users, posts, id, user_id]
  - [users, comments, id, user_id]
  - [posts, comments, id, post_id]
  - [users, likes, id, user_id]
  - [posts, likes, id, post_id]
  - [users, follows, id, follower_id]
